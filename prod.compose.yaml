services:
  judge.master:
    image: codeforge.master:latest
    build:
      context: ./judge
      dockerfile: Dockerfiles/master/Dockerfile
    env_file: judge/Dockerfiles/master/master.env
    ports:
      - "4442:7000"
    networks:
      - public_net
      - private_net
    volumes:
      - type: bind
        source: ./judge/scraped_questions
        target: /questionsDir
        read_only: true
    depends_on:
    - database

  judge.worker.cpp:
    image: codeforge.cpp:latest
    build:
      context: ./judge
      dockerfile: Dockerfiles/cpp/Dockerfile.cpp.prod
    env_file: judge/Dockerfiles/cpp/cpp.env
    networks:
      - private_net
    volumes:
      - type: bind
        source: ./judge/scraped_questions
        target: /questionsDir
        read_only: true
    depends_on:
    - judge.master

  judge.worker.cpp20:
    image: codeforge.cpp20:latest
    build:
      context: ./judge
      dockerfile: Dockerfiles/cpp20/Dockerfile.cpp.prod
    env_file: judge/Dockerfiles/cpp20/cpp.env
    networks:
      - private_net
    volumes:
      - type: bind
        source: ./judge/scraped_questions
        target: /questionsDir
        read_only: true
    depends_on:
    - judge.master

  judge.worker.cpp23:
    image: codeforge.cpp23:latest
    build:
      context: ./judge
      dockerfile: Dockerfiles/cpp23/Dockerfile.cpp.prod
    env_file: judge/Dockerfiles/cpp23/cpp.env
    networks:
      - private_net
    volumes:
      - type: bind
        source: ./judge/scraped_questions
        target: /questionsDir
        read_only: true
    depends_on:
    - judge.master

  judge.worker.c:
    image: codeforge.c:latest
    build:
      context: ./judge
      dockerfile: Dockerfiles/c/Dockerfile.c.prod
    env_file: judge/Dockerfiles/c/c.env
    networks:
      - private_net
    volumes:
      - type: bind
        source: ./judge/scraped_questions
        target: /questionsDir
        read_only: true
    depends_on:
    - judge.master

  judge.worker.python:
    image: codeforge.python:latest
    build:
      context: ./judge
      dockerfile: Dockerfiles/python/Dockerfile.python.prod
    env_file: judge/Dockerfiles/python/python.env
    networks:
      - private_net
    volumes:
      - type: bind
        source: ./judge/scraped_questions
        target: /questionsDir
        read_only: true
    depends_on:
    - judge.master

  judge.worker.node:
    image: codeforge.node:latest
    build:
      context: ./judge
      dockerfile: Dockerfiles/node/Dockerfile.node.prod
    env_file: judge/Dockerfiles/node/node.env
    networks:
      - private_net
    volumes:
      - type: bind
        source: ./judge/scraped_questions
        target: /questionsDir
        read_only: true
    depends_on:
    - judge.master

  database:
    image: postgres:18-trixie
    restart: on-failure
    user: postgres
    volumes:
      - db-cluster:/var/lib/postgresql
    env_file: db/env.dev
    ports:
      - "5432:5432"
    networks:
      - private_net
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-cluster:

networks:
  public_net:
    driver: bridge

  private_net:
    driver: bridge
    internal: true
