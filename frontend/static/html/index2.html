<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeForge — Problems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --card:      #16161f;
      --border:    #1f1f2e;
      --border-hi: #2e2e45;
      --accent:    #7c6af7;
      --accent-lo: rgba(124,106,247,.12);
      --accent-hi: #a89bfa;
      --green:     #22d87a;
      --yellow:    #f5c842;
      --red:       #f75f6a;
      --text:      #e2e2f0;
      --muted:     #6b6b8a;
      --muted-hi:  #9090b0;
      --radius:    10px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .025;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo .bracket { color: var(--accent); font-size: 1.3rem; }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: color .2s;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent-hi); }

    /* HERO */
    .hero {
      padding: 56px 0 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hero-eyebrow {
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: .85;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.05;
    }

    .hero h1 em { font-style: normal; color: var(--accent-hi); }

    .hero-sub {
      margin-top: 6px;
      color: var(--muted-hi);
      font-size: .95rem;
      font-weight: 400;
      max-width: 520px;
      line-height: 1.6;
    }

    .stats-row { display: flex; gap: 32px; margin-top: 20px; }

    .stat { display: flex; flex-direction: column; gap: 3px; }

    .stat-value {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value.green  { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 36px 0 20px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px 10px 40px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .82rem;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted-hi);
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--border-hi); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-lo);
      border-color: var(--accent);
      color: var(--accent-hi);
    }

    /* CATEGORY BAR */
    .category-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .cat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: .75rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: .02em;
    }

    .cat-pill:hover { border-color: var(--border-hi); color: var(--text); }

    .cat-pill.active {
      background: var(--accent-lo);
      border-color: var(--accent);
      color: var(--accent-hi);
    }

    .cat-pill .count {
      background: var(--border);
      border-radius: 999px;
      padding: 1px 7px;
      font-family: var(--mono);
      font-size: .65rem;
    }

    .cat-pill.active .count { background: rgba(124,106,247,.25); }

    /* TABLE */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--surface);
      padding: 14px 20px;
      text-align: left;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    thead th:first-child { width: 56px; text-align: center; }
    thead th:last-child  { width: 160px; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }

    tbody tr:last-child  { border-bottom: none; }
    tbody tr:hover { background: rgba(124,106,247,.05); }

    tbody td { padding: 16px 20px; font-size: .875rem; }

    .td-num {
      text-align: center;
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
    }

    .td-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .q-id {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      min-width: 50px;
    }

    .q-name { transition: color .15s; }
    tbody tr:hover .q-name { color: var(--accent-hi); }

    .cat-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: .72rem;
      font-weight: 600;
      transition: all .15s;
    }

    tbody tr:hover .cat-tag { border-color: var(--border-hi); }

    .cat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .td-action { text-align: right; }

    .solve-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: .72rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .04em;
    }

    tbody tr:hover .solve-btn {
      background: var(--accent-lo);
      border-color: var(--accent);
      color: var(--accent-hi);
    }

    /* EMPTY / LOADING */
    .state-msg {
      text-align: center;
      padding: 64px 0;
      color: var(--muted);
    }

    .state-msg .big { font-size: 2.5rem; margin-bottom: 12px; opacity: .4; }
    .state-msg p    { font-size: .9rem; }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-row td { padding: 18px 20px; }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
    }

    .page-info {
      font-size: .78rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .page-btns { display: flex; gap: 6px; }

    .page-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted-hi);
      font-family: var(--mono);
      font-size: .78rem;
      width: 36px; height: 36px;
      display: grid; place-items: center;
      cursor: pointer;
      transition: all .2s;
    }

    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent-hi); }
    .page-btn.current { background: var(--accent-lo); border-color: var(--accent); color: var(--accent-hi); }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      opacity: 0;
      animation: fadeUp .4s ease forwards;
    }

    /* CATEGORY COLOR DOTS */
    .dot-0 { background: #7c6af7; }
    .dot-1 { background: #22d87a; }
    .dot-2 { background: #f5c842; }
    .dot-3 { background: #f75f6a; }
    .dot-4 { background: #38bdf8; }
    .dot-5 { background: #fb923c; }
    .dot-6 { background: #e879f9; }
    .dot-7 { background: #34d399; }
    .dot-8 { background: #f472b6; }
    .dot-9 { background: #a3e635; }

    @media (max-width: 640px) {
      .stats-row { gap: 18px; }
      .td-action, thead th:last-child { display: none; }
      .hero h1 { font-size: 1.8rem; }
      .nav-links { gap: 18px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <nav>
    <div class="logo">
      <span class="bracket">{</span> CodeForge <span class="bracket">}</span>
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active">Problems</a></li>
      <li><a href="#">Contests</a></li>
      <li><a href="#">Discuss</a></li>
      <li><a href="#">Profile</a></li>
    </ul>
  </nav>

  <section class="hero animate-in" style="animation-delay:.05s">
    <p class="hero-eyebrow">// practice arena</p>
    <h1>Solve. <em>Level up.</em><br>Ship better code.</h1>
    <p class="hero-sub">Pick a problem, write your solution, and sharpen your algorithmic thinking — one challenge at a time.</p>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-value green" id="stat-cats">—</span>
        <span class="stat-label">Categories</span>
      </div>
      <div class="stat">
        <span class="stat-value yellow" id="stat-showing">—</span>
        <span class="stat-label">Showing</span>
      </div>
    </div>
  </section>

  <div class="toolbar animate-in" style="animation-delay:.12s">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search by name, category or ID…" autocomplete="off"/>
    </div>
    <button class="filter-btn active" id="sort-id"   onclick="setSort('id')">Sort: ID</button>
    <button class="filter-btn"        id="sort-name" onclick="setSort('name')">Sort: Name</button>
  </div>

  <div class="category-bar animate-in" id="category-bar" style="animation-delay:.18s">
    <button class="cat-pill active" data-cat="All" onclick="selectCategory('All')">
      All <span class="count" id="cnt-all">0</span>
    </button>
  </div>

  <div class="table-wrap animate-in" style="animation-delay:.24s">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Problem</th>
          <th>Category</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="skel-row"><td class="td-num"><div class="skeleton" style="width:24px;margin:auto"></div></td><td><div class="skeleton" style="width:220px"></div></td><td><div class="skeleton" style="width:120px"></div></td><td></td></tr>
        <tr class="skel-row"><td class="td-num"><div class="skeleton" style="width:24px;margin:auto"></div></td><td><div class="skeleton" style="width:180px"></div></td><td><div class="skeleton" style="width:100px"></div></td><td></td></tr>
        <tr class="skel-row"><td class="td-num"><div class="skeleton" style="width:24px;margin:auto"></div></td><td><div class="skeleton" style="width:250px"></div></td><td><div class="skeleton" style="width:130px"></div></td><td></td></tr>
        <tr class="skel-row"><td class="td-num"><div class="skeleton" style="width:24px;margin:auto"></div></td><td><div class="skeleton" style="width:200px"></div></td><td><div class="skeleton" style="width:90px"></div></td><td></td></tr>
        <tr class="skel-row"><td class="td-num"><div class="skeleton" style="width:24px;margin:auto"></div></td><td><div class="skeleton" style="width:160px"></div></td><td><div class="skeleton" style="width:110px"></div></td><td></td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination animate-in" style="animation-delay:.28s">
    <span class="page-info" id="page-info"></span>
    <div class="page-btns" id="page-btns"></div>
  </div>

</div>

<script>
  let allQuestions = [];
  let filtered     = [];
  let currentCat   = 'All';
  let searchQuery  = '';
  let sortMode     = 'id';
  let currentPage  = 1;
  const PAGE_SIZE  = 20;

  const catColorMap = {};
  let colorIdx = 0;

  function getCatColor(cat) {
    if (catColorMap[cat] === undefined) {
      catColorMap[cat] = colorIdx % 10;
      colorIdx++;
    }
    return catColorMap[cat];
  }

  async function loadQuestions() {
    try {
      const res  = await fetch('./api/question/');
      const data = await res.json();
      allQuestions = data.Questions || [];
    } catch (e) {
      // Demo fallback
      allQuestions = [
        { QuestionId: 3138, QuestionName: 'String Compression',      QuestionCategory: 'String Algorithms' },
        { QuestionId: 1637, QuestionName: 'Coin Change',             QuestionCategory: 'Dynamic Programming' },
        { QuestionId: 1715, QuestionName: 'Prime Sieve',             QuestionCategory: 'Mathematics' },
        { QuestionId: 2105, QuestionName: 'Longest Palindrome',      QuestionCategory: 'String Algorithms' },
        { QuestionId: 2910, QuestionName: 'Min Path Sum',            QuestionCategory: 'Dynamic Programming' },
        { QuestionId: 1021, QuestionName: 'Binary Search',           QuestionCategory: 'Searching' },
        { QuestionId: 1022, QuestionName: 'Two Sum',                 QuestionCategory: 'Arrays' },
        { QuestionId: 1023, QuestionName: 'Merge Sort',              QuestionCategory: 'Sorting' },
        { QuestionId: 1024, QuestionName: 'LRU Cache',               QuestionCategory: 'Design' },
        { QuestionId: 1025, QuestionName: 'Graph BFS',               QuestionCategory: 'Graphs' },
        { QuestionId: 1026, QuestionName: 'Kruskal MST',             QuestionCategory: 'Graphs' },
        { QuestionId: 1027, QuestionName: 'Knapsack Problem',        QuestionCategory: 'Dynamic Programming' },
        { QuestionId: 1028, QuestionName: 'Quick Sort',              QuestionCategory: 'Sorting' },
        { QuestionId: 1029, QuestionName: 'Trie Insertion',          QuestionCategory: 'Trees' },
        { QuestionId: 1030, QuestionName: 'Segment Tree Range Sum',  QuestionCategory: 'Trees' },
        { QuestionId: 1031, QuestionName: 'Fibonacci DP',            QuestionCategory: 'Dynamic Programming' },
        { QuestionId: 1032, QuestionName: 'Rabin-Karp Search',       QuestionCategory: 'String Algorithms' },
        { QuestionId: 1033, QuestionName: 'Dijkstra Shortest Path',  QuestionCategory: 'Graphs' },
        { QuestionId: 1034, QuestionName: 'N-Queens Backtrack',      QuestionCategory: 'Backtracking' },
        { QuestionId: 1035, QuestionName: 'Sudoku Solver',           QuestionCategory: 'Backtracking' },
        { QuestionId: 1036, QuestionName: 'GCD & LCM',               QuestionCategory: 'Mathematics' },
        { QuestionId: 1037, QuestionName: 'Heap Sort',               QuestionCategory: 'Sorting' },
        { QuestionId: 1038, QuestionName: 'Stack using Queues',      QuestionCategory: 'Design' },
        { QuestionId: 1039, QuestionName: 'Balanced Parentheses',    QuestionCategory: 'String Algorithms' },
        { QuestionId: 1040, QuestionName: 'Matrix Rotation',         QuestionCategory: 'Arrays' },
      ];
    }
    init();
  }

  function init() {
    buildCategories();
    applyFilters();
    document.getElementById('stat-total').textContent = allQuestions.length;
    const cats = new Set(allQuestions.map(q => q.QuestionCategory));
    document.getElementById('stat-cats').textContent  = cats.size;
  }

  function buildCategories() {
    const bar  = document.getElementById('category-bar');
    const cats = {};
    allQuestions.forEach(q => {
      cats[q.QuestionCategory] = (cats[q.QuestionCategory] || 0) + 1;
    });

    document.getElementById('cnt-all').textContent = allQuestions.length;

    [...bar.querySelectorAll('[data-cat]:not([data-cat="All"])')].forEach(el => el.remove());

    Object.entries(cats)
      .sort((a, b) => b[1] - a[1])
      .forEach(([cat, count]) => {
        getCatColor(cat); // register color
        const pill = document.createElement('button');
        pill.className   = 'cat-pill';
        pill.dataset.cat = cat;
        pill.onclick     = () => selectCategory(cat);
        pill.innerHTML   = `${escHtml(cat)} <span class="count">${count}</span>`;
        bar.appendChild(pill);
      });
  }

  function selectCategory(cat) {
    currentCat  = cat;
    currentPage = 1;
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.cat === cat);
    });
    applyFilters();
  }

  function setSort(mode) {
    sortMode = mode;
    document.getElementById('sort-id').classList.toggle('active',   mode === 'id');
    document.getElementById('sort-name').classList.toggle('active', mode === 'name');
    applyFilters();
  }

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    currentPage = 1;
    applyFilters();
  });

  function applyFilters() {
    filtered = allQuestions.filter(q => {
      const catOk  = currentCat === 'All' || q.QuestionCategory === currentCat;
      const srchOk = !searchQuery
        || q.QuestionName.toLowerCase().includes(searchQuery)
        || q.QuestionCategory.toLowerCase().includes(searchQuery)
        || String(q.QuestionId).includes(searchQuery);
      return catOk && srchOk;
    });

    if (sortMode === 'id') {
      filtered.sort((a, b) => a.QuestionId - b.QuestionId);
    } else {
      filtered.sort((a, b) => a.QuestionName.localeCompare(b.QuestionName));
    }

    document.getElementById('stat-showing').textContent = filtered.length;
    renderTable();
    renderPagination();
  }

  function renderTable() {
    const tbody = document.getElementById('table-body');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    if (page.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="4">
          <div class="state-msg">
            <div class="big">∅</div>
            <p>No problems match your filters.</p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = page.map((q, i) => {
      const idx = getCatColor(q.QuestionCategory);
      return `
      <tr onclick="goTo(${q.QuestionId})" class="animate-in" style="animation-delay:${i * 0.022}s">
        <td class="td-num">${start + i + 1}</td>
        <td class="td-title">
          <span class="q-id">#${q.QuestionId}</span>
          <span class="q-name">${escHtml(q.QuestionName)}</span>
        </td>
        <td>
          <span class="cat-tag">
            <span class="cat-dot dot-${idx}"></span>
            ${escHtml(q.QuestionCategory)}
          </span>
        </td>
        <td class="td-action">
          <button class="solve-btn">Solve →</button>
        </td>
      </tr>`;
    }).join('');
  }

  function renderPagination() {
    const total      = filtered.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const start      = (currentPage - 1) * PAGE_SIZE + 1;
    const end        = Math.min(currentPage * PAGE_SIZE, total);

    document.getElementById('page-info').textContent =
      total === 0 ? 'No results' : `${start}–${end} of ${total} problems`;

    const btns = document.getElementById('page-btns');
    btns.innerHTML = '';
    if (totalPages <= 1) return;

    btns.appendChild(mkBtn('‹', currentPage === 1, () => gotoPage(currentPage - 1)));

    let lo = Math.max(1, currentPage - 2);
    let hi = Math.min(totalPages, lo + 4);
    lo = Math.max(1, hi - 4);

    for (let p = lo; p <= hi; p++) {
      const b = mkBtn(p, false, () => gotoPage(p));
      if (p === currentPage) b.classList.add('current');
      btns.appendChild(b);
    }

    btns.appendChild(mkBtn('›', currentPage === totalPages, () => gotoPage(currentPage + 1)));
  }

  function mkBtn(label, disabled, handler) {
    const b = document.createElement('button');
    b.className   = 'page-btn';
    b.textContent = label;
    b.disabled    = disabled;
    b.onclick     = handler;
    return b;
  }

  function gotoPage(p) {
    currentPage = p;
    renderTable();
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goTo(id) {
    window.location.href = `./problems/${id}/`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadQuestions();
</script>
</body>
</html>
