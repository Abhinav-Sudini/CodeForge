<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CodeForge — Solve Problem</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <style>
        :root {
            --bg:        #0a0a0f;
            --surface:   #111118;
            --card:      #16161f;
            --border:    #1f1f2e;
            --border-hi: #2e2e45;
            --accent:    #7c6af7;
            --accent-lo: rgba(124,106,247,.12);
            --accent-hi: #a89bfa;
            --green:     #22d87a;
            --yellow:    #f5c842;
            --red:       #f75f6a;
            --text:      #e2e2f0;
            --muted:     #6b6b8a;
            --muted-hi:  #9090b0;
            --radius:    10px;
            --mono:      'JetBrains Mono', monospace;
            --sans:      'Syne', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: .025;
            pointer-events: none;
            z-index: 0;
        }

        /* NAVBAR */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo {
            font-family: var(--mono);
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo .bracket { color: var(--accent); }

        .nav-center { display: flex; gap: 24px; }
        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 6px;
            color: var(--muted-hi);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--text); }

        /* MAIN LAYOUT */
        main { flex: 1; display: flex; overflow: hidden; position: relative; }

        .panel-left {
            width: 40%;
            min-width: 400px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: var(--bg);
            z-index: 1;
        }

        .tabs-header {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .tab-trigger {
            padding: 14px 24px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-trigger.active {
            color: var(--accent-hi);
            border-bottom-color: var(--accent);
            background: rgba(124, 106, 247, 0.05);
        }

        .tab-content { flex: 1; overflow-y: auto; padding: 32px; scroll-behavior: smooth; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeUp 0.4s ease forwards; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PROBLEM CONTENT */
        .q-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
        .badge {
            font-family: var(--mono);
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--accent-lo);
            border: 1px solid var(--accent);
            color: var(--accent-hi);
        }

        .desc-label { 
            font-weight: 700; font-size: 0.75rem; text-transform: uppercase; 
            color: var(--muted-hi); margin: 24px 0 12px; display: block; letter-spacing: 0.05em; 
        }
        
        .desc-text { line-height: 1.7; font-size: 0.92rem; color: var(--text); opacity: 0.9; }

        pre.example-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 0.82rem;
            margin: 12px 0;
            overflow-x: auto;
            color: var(--accent-hi);
        }

        /* SUBMISSIONS */
        .sub-table { width: 100%; border-collapse: collapse; }
        .sub-table th { text-align: left; color: var(--muted); font-size: 0.65rem; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--border); }
        .sub-table td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-family: var(--mono); }
        .sub-table tbody tr { cursor: pointer; transition: background 0.2s; }
        .sub-table tbody tr:hover { background: var(--surface); }
        .verdict-Accepted { color: var(--green); font-weight: 700; }
        .verdict-Rejected { color: var(--red); font-weight: 700; }

        /* EDITOR PANEL */
        .panel-right { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; }
        .editor-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
        }
        #monaco-container { flex: 1; width: 100%; }

        select {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 6px 12px; border-radius: 6px; font-family: var(--mono); font-size: 0.75rem; outline: none;
        }

        .action-btns { display: flex; gap: 10px; }
        .btn {
            border: none; border-radius: 6px; padding: 8px 18px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; font-family: var(--sans);
        }
        .btn-run { background: var(--border-hi); color: var(--text); }
        .btn-submit { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* RESULT CONSOLE */
        .console {
            height: 44px; background: var(--surface); border-top: 1px solid var(--border);
            display: flex; flex-direction: column; transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; z-index: 20;
        }
        .console.expanded { height: 320px; }
        .console-head {
            height: 44px; min-height: 44px; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
            border-bottom: 1px solid transparent;
        }
        .console.expanded .console-head { border-bottom-color: var(--border); }
        .console-body { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .console.expanded .console-body { display: block; }

        .verdict-card {
            background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px;
        }
        .verdict-card.Accepted { border-color: var(--green); background: rgba(34, 216, 122, 0.05); }
        .verdict-card.Error { border-color: var(--red); background: rgba(247, 95, 106, 0.05); }

        .terminal-block {
            margin-top: 15px; background: #000; padding: 12px; border-radius: 6px;
            font-family: var(--mono); font-size: 0.8rem; overflow-x: auto;
        }
        .terminal-label { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 6px; display: block; }

        .spinner {
            width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">
            <span class="bracket">{</span> CodeForge <span class="bracket">}</span>
        </a>
        <div class="nav-center" id="nav-q-title">
            <span style="color: var(--muted); font-size: 0.8rem;">Loading metadata...</span>
        </div>
        <div class="nav-right">
            <button class="nav-btn">Problems</button>
        </div>
    </nav>

    <main>
        <aside class="panel-left">
            <div class="tabs-header">
                <div class="tab-trigger active" onclick="switchTab('description')">Description</div>
                <div class="tab-trigger" onclick="switchTab('submissions')">Submissions</div>
            </div>
            <div class="tab-content">
                <div id="tab-description" class="content-section active">
                    <div id="q-content">
                        <!-- Content injected by JS -->
                    </div>
                </div>
                <div id="tab-submissions" class="content-section">
                    <table class="sub-table">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Memory</th>
                                <th>Time</th>
                                <th>Submitted</th>
                            </tr>
                        </thead>
                        <tbody id="sub-list">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </aside>

        <section class="panel-right">
            <div class="editor-header">
                <select id="lang-select" onchange="handleLangChange()">
                    <option value="cpp">C++ 23</option>
                    <option value="python">Python 3</option>
                    <option value="javascript">JavaScript</option>
                </select>
                <div class="action-btns">
                    <button class="btn btn-run" onclick="simulateAction('run')">Run Code</button>
                    <button id="submit-btn" class="btn btn-submit" onclick="submitCode()">Submit</button>
                </div>
            </div>
            <div id="monaco-container"></div>
            
            <div id="console" class="console">
                <div class="console-head" onclick="toggleConsole()">
                    <span style="font-size: 0.75rem; font-weight: 700; color: var(--muted-hi); display: flex; align-items: center; gap: 8px;">
                        <svg id="console-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="transition: transform 0.3s;"><path d="m18 15-6-6-6 6"/></svg>
                        CONSOLE
                    </span>
                    <span id="console-status" style="font-family: var(--mono); font-size: 0.7rem; font-weight: 700;"></span>
                </div>
                <div class="console-body" id="console-body">
                    <div style="color: var(--muted); text-align: center; font-size: 0.85rem; margin-top: 40px;">
                        Run your code to see output here.
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let editor;
        const currentQId = 3138;
        const templates = {
            cpp: `#include <iostream>\nusing namespace std;\n\nint main() {\n    // solve here\n    return 0;\n}`,
            python: `import sys\n\ndef solve():\n    pass\n\nif __name__ == "__main__":\n    solve()`,
            javascript: `const fs = require('fs');\nconst input = fs.readFileSync(0, 'utf8');\n\nconsole.log(input);`
        };

        // Fallback Dummy Data
        const dummyQuestion = {
            "QuestionID": 3138,
            "QuestionCategory": "String Algorithms",
            "QuestionName": "Longest Palindrome Endings",
            "QuestionDescription": "<p>Given a string, calculate for each position the length of the longest palindrome that ends at that position.</p>",
            "InputDescription": "<p>The only line contains a string of length $n$. Each character is one of a–z.</p>",
            "OutputDescription": "<p>Print $n$ numbers: the length of each palindrome.</p>",
            "ConstraintsDescription": "<ul><li>$1 \\le n \\le 2 \\cdot 10^5$</li></ul>",
            "ExampleInputs": [ "ababbababaa\n" ],
            "ExampleOutputs": [ "1 1 3 3 2 4 6 8 5 5 2\n" ]
        };

        const dummySubmissions = [
            { 
                "Submission_id": 876, 
                "Verdict": "Accepted", 
                "Mem_usage": 9216, 
                "Time_ms": 6, 
                "WA_Test_case": 0,
                "WA_Stdout": "",
                "Stderr": "",
                "SubmissionTime": "2026-03-16T10:48:09Z" 
            },
            { 
                "Submission_id": 875, 
                "Verdict": "Memory Limit Exceeded", 
                "Mem_usage": 4608, 
                "Time_ms": 0, 
                "WA_Test_case": 1,
                "WA_Stdout": "Output exceeded allowed memory bounds on large input test.",
                "Stderr": "Traceback (most recent call last):\n  File \"solution.py\", line 12, in <module>\n    grid = [[0]*n for _ in range(n)]\nMemoryError",
                "SubmissionTime": "2026-03-16T10:43:30Z" 
            }
        ];

        window.onload = () => {
            initMonaco();
            loadQuestion();
            loadSubmissions();
        };

        function initMonaco() {
            require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(document.getElementById('monaco-container'), {
                    value: templates.cpp,
                    language: 'cpp',
                    theme: 'vs-dark',
                    automaticLayout: true,
                    fontSize: 14,
                    fontFamily: 'JetBrains Mono',
                    minimap: { enabled: false },
                    padding: { top: 20 },
                    cursorSmoothCaretAnimation: "on",
                    roundedSelection: true
                });
            });
        }

        async function loadQuestion() {
            try {
                renderQuestion(dummyQuestion);
            } catch (e) {
                renderQuestion(dummyQuestion);
            }
        }

        function renderQuestion(data) {
            document.getElementById('nav-q-title').innerHTML = `
                <span style="color: var(--text); font-weight: 700;">${data.QuestionID}. ${data.QuestionName}</span>
            `;
            
            const html = `
                <h1 class="q-title">${data.QuestionName}</h1>
                <div style="margin-bottom: 24px;"><span class="badge">${data.QuestionCategory}</span></div>
                
                <span class="desc-label">Description</span>
                <div class="desc-text">${data.QuestionDescription}</div>

                <span class="desc-label">Input Specification</span>
                <div class="desc-text">${data.InputDescription}</div>

                <span class="desc-label">Output Specification</span>
                <div class="desc-text">${data.OutputDescription}</div>

                <span class="desc-label">Constraints</span>
                <div class="desc-text">${data.ConstraintsDescription}</div>

                <span class="desc-label">Example Case</span>
                <pre class="example-box"><strong>Input:</strong>\n${data.ExampleInputs[0]}\n<strong>Output:</strong>\n${data.ExampleOutputs[0]}</pre>
            `;
            
            const container = document.getElementById('q-content');
            container.innerHTML = html;
            
            renderMathInElement(container, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        async function loadSubmissions() {
            try {
                renderSubmissions(dummySubmissions);
            } catch (e) {
                renderSubmissions(dummySubmissions);
            }
        }

        function renderSubmissions(list) {
            const body = document.getElementById('sub-list');
            body.innerHTML = list.map(s => `
                <tr onclick="viewSubmission(${s.Submission_id})">
                    <td class="verdict-${s.Verdict.includes('Accepted') ? 'Accepted' : 'Rejected'}">${s.Verdict}</td>
                    <td>${s.Mem_usage} KB</td>
                    <td>${s.Time_ms} ms</td>
                    <td style="color: var(--muted);">${new Date(s.SubmissionTime).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function viewSubmission(id) {
            const submission = dummySubmissions.find(s => s.Submission_id === id);
            if (submission) {
                toggleConsole('expand');
                displayFinalVerdict(submission);
            }
        }

        function handleLangChange() {
            const lang = document.getElementById('lang-select').value;
            const model = editor.getModel();
            monaco.editor.setModelLanguage(model, lang === 'cpp' ? 'cpp' : (lang === 'python' ? 'python' : 'javascript'));
            editor.setValue(templates[lang]);
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
            document.getElementById(`tab-${name}`).classList.add('active');
        }

        function toggleConsole(state) {
            const el = document.getElementById('console');
            const arrow = document.getElementById('console-arrow');
            if (state === 'expand') {
                el.classList.add('expanded');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                el.classList.toggle('expanded');
                arrow.style.transform = el.classList.contains('expanded') ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        }

        async function submitCode() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = `<div class="spinner"></div>`;
            
            toggleConsole('expand');
            updateConsoleStatus("IN QUEUE", "var(--accent-hi)");
            document.getElementById('console-body').innerHTML = `<div style="color: var(--muted); text-align: center; padding: 40px 0;">Submitting code to judge engine...</div>`;

            // Lifecycle simulation
            setTimeout(() => {
                updateConsoleStatus("RUNNING", "var(--yellow)");
                document.getElementById('console-body').innerHTML = `<div style="color: var(--muted); text-align: center; padding: 40px 0;">Running against hidden test cases...</div>`;
                
                setTimeout(() => {
                    const finalVerdict = {
                        Verdict: "Accepted",
                        Mem_usage: 9216,
                        Time_ms: 6,
                        WA_Test_case: 0,
                        WA_Stdout: "",
                        Stderr: ""
                    };
                    displayFinalVerdict(finalVerdict);
                    btn.disabled = false;
                    btn.innerText = "Submit";
                }, 1200);
            }, 800);
        }

        function displayFinalVerdict(data) {
            const isAccepted = data.Verdict === "Accepted";
            updateConsoleStatus(data.Verdict.toUpperCase(), isAccepted ? "var(--green)" : "var(--red)");
            
            let html = `
                <div class="verdict-card ${isAccepted ? 'Accepted' : 'Error'} animate-in">
                    <div style="font-size: 1.2rem; font-weight: 800; margin-bottom: 8px;">${data.Verdict}</div>
                    <div style="display: flex; gap: 20px; font-family: var(--mono); font-size: 0.75rem; color: var(--muted-hi);">
                        <span>TIME: ${data.Time_ms}ms</span>
                        <span>MEMORY: ${data.Mem_usage}KB</span>
                    </div>
            `;

            if (data.WA_Test_case > 0) {
                html += `
                    <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
                        <span class="terminal-label">Failed Test Case</span>
                        <div style="color: var(--red); font-size: 0.85rem; font-weight: 700;">Case #${data.WA_Test_case}</div>
                    </div>
                `;
            }

            if (data.WA_Stdout) {
                html += `
                    <div class="terminal-block">
                        <span class="terminal-label">Stdout</span>
                        <div style="color: var(--text);">${data.WA_Stdout}</div>
                    </div>
                `;
            }

            if (data.Stderr) {
                html += `
                    <div class="terminal-block" style="border-left: 2px solid var(--red);">
                        <span class="terminal-label">Stderr</span>
                        <div style="color: var(--red); opacity: 0.9;">${data.Stderr}</div>
                    </div>
                `;
            }

            html += `</div>`;
            document.getElementById('console-body').innerHTML = html;
            
            // Re-render submissions if it's a new one (simulated)
            loadSubmissions();
        }

        function updateConsoleStatus(text, color) {
            const el = document.getElementById('console-status');
            el.innerText = text;
            el.style.color = color;
        }

        function simulateAction(type) {
            toggleConsole('expand');
            document.getElementById('console-body').innerHTML = `<div style="color: var(--muted); text-align: center; padding: 40px 0;">Compiling for ${type}...</div>`;
            setTimeout(() => {
                displayFinalVerdict({ 
                    Verdict: "Accepted", 
                    Time_ms: 2, 
                    Mem_usage: 120, 
                    WA_Test_case: 0,
                    WA_Stdout: "Success: Solution verified against sample cases.",
                    Stderr: "" 
                });
            }, 500);
        }
    </script>
</body>
</html>
